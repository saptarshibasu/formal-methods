# kit-manifest.conf — machine-readable kit-owned path list.
#
# This is the SINGLE SOURCE OF TRUTH for "what does update-kit.{sh,ps1} copy
# into a project." Before this file existed, the same list was hand-maintained
# separately in update-kit.sh's KIT_OWNED_FILES array and update-kit.ps1's
# $kitOwnedFiles array, with nothing enforcing agreement between them. Now:
# both updaters read this file at run time — from this kit checkout, not from
# any project — so there is nothing left to hand-sync between the two scripts.
#
# Edit THIS file to add/remove a kit-owned path, and call it out in
# KIT-CHANGELOG.md.
#
# update-kit.sh/.ps1 always run from inside a kit checkout (this repo, or a
# clone of it) and read this file from that same checkout — never from a
# project's copy. The target project is passed as an argument; this file has
# no concept of "which version" a project is on, it just describes what this
# checkout, as it stands right now, considers kit-owned.
#
# Format: "<namespace>=<path>", one per line, repeatable. Blank lines and
# lines starting with '#' are ignored. No quoting; leading/trailing
# whitespace around '=' is trimmed.
#
# Namespaces:
#   file=<path>     — whole-file kit-owned path. Copied verbatim (added or
#                      updated, never deleted — an upstream removal is called
#                      out in KIT-CHANGELOG.md and removed by hand).
#   dir=<path>       — whole-directory kit-owned path. Merged: files are
#                      added/updated from the source, nothing deleted.
#   adr_dir=<path>   — directory of the kit's own ADRs, matched by filename
#                      against the source checkout — project-authored ADRs
#                      (filenames the source doesn't have) are left alone.
#                      Currently unused (zero entries) — the kit's ADRs are no
#                      longer distributed; see the note below.
#   seed=<path>      — whole-file, but copied ONLY if missing in the target;
#                      never overwritten once present. For org-owned data
#                      files a project must have to run kit scripts, but is
#                      free to edit — a plain `file=` entry would clobber
#                      those edits on every update. Silent: no output line
#                      when the target already has it (the common case on a
#                      re-run), one line when it's seeded for the first time.
#
# Unknown namespaces are a hard error at update time — add a case for it here
# and in both updaters' parsers, don't special-case a path in the scripts.
#
# NOT listed here on purpose: this repo's own KIT_VERSION, KIT-CHANGELOG.md,
# and scripts/update-kit.sh(.ps1). The kit is not installed into a project as
# files — it stays in whatever checkout you cloned, and you re-run
# update-kit.sh from there whenever you want to pull in kit changes. There is
# no per-project "installed kit version" to track any more, so nothing here
# copies those three paths downstream.
#
# ALSO NOT listed here on purpose: .githooks/pre-commit(.ps1) and
# .github/workflows/agent-harness.yml. A CI workflow isn't opt-in the way a
# git hook is — GitHub auto-runs anything under .github/workflows/ the moment
# it lands in a repo, which surprised adopters who already had their own CI.
# Both files still live in this repo (the kit uses them on itself, commented
# inline), but update-kit.sh has no mechanism for copying or updating a
# partially-owned file — an adopter who wants either file copies it in by
# hand and owns it from that point on, like any other file this manifest
# doesn't list.
#
# ALSO NOT listed here on purpose: .gitattributes. Like the root LICENSE
# below, it's a repo-wide policy file the adopter owns — their copy may
# carry LFS rules, linguist overrides, or merge drivers, and this kit's
# `* text=auto eol=lf` is a whole-repo choice that isn't the kit's to make.
# The updater has no partially-owned-file mechanism (see the hook/CI note
# above), so it's copy-by-hand: the file stays in this repo, and adopters
# should merge two things into their own .gitattributes — `*.sh` / `*.bash`
# / `*.ps1 text eol=lf` (CRLF breaks shebangs on Unix shells) and the
# linguist-generated / merge=ours attributes on the generated mirror dirs
# (.claude/**, .codex/**, .github/agents/**, .github/skills/**).
#
# ALSO not listed here on purpose: the root LICENSE. A project's root
# LICENSE declares the *project's* license — that is the adopter's choice,
# and overwriting it on every update would silently misrepresent their whole
# repo as Apache-2.0. The kit's license still ships (Apache-2.0 §4(a)
# requires a copy of the license alongside redistributed files), but at
# .agents/LICENSE, scoped to the kit-owned paths, where it can't collide
# with anything the adopter owns. Adopters who picked up a kit-copied root
# LICENSE from an earlier kit version should review it and remove it by hand
# if it doesn't match their project's actual license.
#
# ALSO not listed here on purpose: docs/adr/ (the kit's own ADRs). They
# record why the kit's own internals work the way they do — useful to kit
# maintainers, not to a downstream project's feature work (nothing in a
# shipped agent/skill file requires the ADR text itself, only the rule it
# justifies, which is always stated inline where it matters). Keeping a
# stale local snapshot of upstream design history in every adopting project
# is not worth the onboarding footprint. The 7 ADRs stay in this kit repo;
# an adopting project's own docs/adr/ starts fresh at 0001 with create-adr.

file=.agents/kit-manifest.conf
file=.agents/LICENSE
file=.mcp.json.example
file=scripts/mirror-agents.sh
file=scripts/mirror-agents.ps1
file=scripts/mirror-skills.sh
file=scripts/mirror-skills.ps1
file=scripts/quiet.sh
file=scripts/quiet.ps1
file=docs/README.md
file=docs/guardrails.md

dir=.agents/agents
dir=.agents/skills
dir=.agents/extensions
dir=templates

# Org-specific policy data mirror-agents.{sh,ps1} require to run (see that
# file's header) but which a project must be free to edit to match its own
# org's models/tools — seeded once, then left alone on every later update.
seed=.agents/model-map.conf

# model-map.conf — org-specific policy data for scripts/mirror-agents.{sh,ps1}.
#
# EDIT this file to match your org's enabled models/tools. Both mirror scripts
# read it at run time, so there is nothing left to hand-sync between the two
# implementations — only this data file needs to change.
#
# Format: "<namespace>.<key>=<value>", one per line. Blank lines and lines
# starting with '#' are ignored. Do not quote values; trailing/leading
# whitespace around '=' is trimmed.
#
# Namespaces:
#   copilot_model.<tier>  — Copilot `model` front-matter value for a canonical
#                            model tier (opus/sonnet/haiku). MUST be a single
#                            model string: Copilot's custom-agent `model`
#                            property is typed `string` (Model to use when this
#                            custom agent executes; if unset, inherits the
#                            default model), NOT a list. A YAML array here is
#                            unparseable, so Copilot silently ignores it and the
#                            agent inherits the orchestrator's default model
#                            (the "always Sonnet in JetBrains" bug). The value
#                            must match a model name your org's Copilot exposes
#                            in its picker/autocomplete exactly — a wrong string
#                            also degrades to the default, with no error. No
#                            in-file fallback list; pick one model per tier.
#                            (https://docs.github.com/en/copilot/reference/custom-agents-configuration)
#   codex_model.<tier>     — Codex `model` for a canonical model tier.
#   codex_effort.<tier>    — Codex `model_reasoning_effort` for a canonical
#                            model tier.
#                            (https://developers.openai.com/codex/config-reference)
#   codex_tool.<ToolName>  — Codex tool name equivalent for a Claude tool name.
#
# Unknown tiers/tools referenced by an agent's front-matter are still a hard
# error at generation time — add the mapping here, not in the scripts.

copilot_model.opus=Claude Opus 4.8
copilot_model.sonnet=Claude Sonnet 4.6
copilot_model.haiku=Claude Haiku 4.5

codex_model.opus=gpt-5.4
codex_model.sonnet=gpt-5.4
codex_model.haiku=gpt-5.4-mini

codex_effort.opus=high
codex_effort.sonnet=medium
codex_effort.haiku=medium

codex_tool.Read=read
codex_tool.Grep=grep
codex_tool.Glob=grep
codex_tool.Bash=shell
codex_tool.Edit=edit
codex_tool.Write=write

spring:
  application:
    name: formal-methods

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/formal_methods}
    username: ${SPRING_DATASOURCE_USERNAME:formal_methods}
    password: ${SPRING_DATASOURCE_PASSWORD:formal_methods}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      # No migration tool manages the schema; Hibernate only validates that the
      # database matches the entity mappings at startup instead of generating DDL.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.formalmethods: INFO

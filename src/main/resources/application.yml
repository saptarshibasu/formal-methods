spring:
  application:
    name: verification-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/verification}
    username: ${SPRING_DATASOURCE_USERNAME:verification}
    password: ${SPRING_DATASOURCE_PASSWORD:verification}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema (db/migration); Hibernate only validates it matches
      # the entity mappings at startup instead of generating/altering DDL itself.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.formalmethods.verification: INFO
